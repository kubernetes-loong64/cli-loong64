name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      RAW_VERSION: ${{ steps.extract.outputs.RAW_VERSION }}
      CLI_BRANCH: ${{ steps.extract.outputs.CLI_BRANCH }}
      RELEASE: ${{ steps.extract.outputs.RELEASE }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract cli branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_ENV}
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_OUTPUT}
          CLI_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "CLI_BRANCH=$CLI_BRANCH"
          echo "CLI_BRANCH=$CLI_BRANCH" >> ${GITHUB_ENV}
          echo "CLI_BRANCH=$CLI_BRANCH" >> ${GITHUB_OUTPUT}
          RELEASE=$(echo $RAW_VERSION | awk -F'+' '{print $2}')
          RELEASE=${RELEASE:-alpha.${{ github.run_number }}}
          echo "RELEASE=$RELEASE"
          echo "RELEASE=$RELEASE" >> ${GITHUB_ENV}
          echo "RELEASE=$RELEASE" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file
      - name: Clone cli
        run: |
          git clone --branch ${{ env.CLI_BRANCH }} --depth 1 https://github.com/docker/cli.git cli
      - name: ls
        run: ls -lah
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: cli
      #  run: git apply ../*.patch
      - name: Build cli
        working-directory: cli
        run: docker buildx bake binary --set "*.platform=linux/loong64"
      - name: Print binary SHA-256 checksums
        working-directory: cli
        run: |
          find build/* | xargs sha256sum
      - name: Inspect binary file types
        working-directory: cli
        run: |
          echo "=== bin ==="
          file build/*
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-binaries
          path: |
            cli/build/docker
      - name: Install QEMU binfmt for loong64
        run: |
          docker run --privileged --rm ghcr.io/loong64/binfmt --install all
      - name: Print docker version
        working-directory: cli
        run: |
          ./build/docker -v
          ./build/docker version
      - name: Generate shell completions
        working-directory: cli
        run: |
          mkdir -p completions
          ./build/docker completion bash > completions/docker.bash
          ./build/docker completion fish > completions/docker.fish
          ./build/docker completion zsh  > completions/_docker.zsh
          echo "=== docker.bash ==="
          cat completions/docker.bash
          echo "=== docker.fish ==="
          cat completions/docker.fish
          echo "=== _docker.zsh ==="
          cat completions/_docker.zsh
      - name: Upload shell completions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-completions
          path: |
            cli/completions/*
      - name: Generate man pages
        working-directory: cli
        run: |
          apt install -y help2man
          mkdir -p man
          help2man -n "Docker CLI (loong64)" -N -o man/docker.1 ./build/docker
          echo "=== docker.1 ==="
          man man/docker.1 2>/dev/null | head -30 || cat man/docker.1 | head -30
          echo "=== man file list ==="
          find man -type f
          sha256sum man/docker.1
      - name: Upload man pages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-man
          path: |
            cli/man/*
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/build-os-release.txt
          cat /tmp/build-os-release.txt
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/build-installed-packages.txt
          cat /tmp/build-installed-packages.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-system-info
          path: |
            /tmp/build-installed-packages.txt
            /tmp/build-os-release.txt

  rpm-anolis:
    needs: build
    runs-on: ubuntu-latest
    container: openanolis/anolisos:23
    outputs:
      ANOLIS_RPM_NAME: ${{ steps.rpm-file.outputs.ANOLIS_RPM_NAME }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      CLI_BRANCH: ${{ needs.build.outputs.CLI_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loongarch64
    steps:
      - name: Install gzip
        run: yum install -y gzip
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract version
        run: |
          VERSION=$(echo $CLI_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
          DIST=$(rpm --eval '%{dist}')
          echo "DIST=$DIST"
          echo "DIST=$DIST" >> ${GITHUB_ENV}
      - name: Install build tools
        run: yum install -y rpm-build rpmdevtools rpm-sign
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-binaries
          path: artifacts
      - name: Download shell completions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-completions
          path: artifacts/completions
      - name: Download man pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-man
          path: artifacts/man
      - name: Build RPM
        run: |
          rm -rf ~/rpmbuild
          rpmdev-setuptree
          find ~/rpmbuild
          cp artifacts/docker ~/rpmbuild/BUILD/
          cp -r artifacts/completions ~/rpmbuild/BUILD/
          cp -r artifacts/man ~/rpmbuild/BUILD/
          cp LICENSE ~/rpmbuild/BUILD/
          cp docker-ce-cli.spec ~/rpmbuild/SPECS/
          rpmbuild -ba --target ${{ env.ARCH }} ~/rpmbuild/SPECS/docker-ce-cli.spec \
            --define "version ${{ env.VERSION }}" \
            --define "release ${{ env.RELEASE }}"
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm'
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp -t rpms {} +
      - name: List RPM files
        id: rpm-file
        run: |
          ANOLIS_RPM_NAME=docker-ce-cli-${{ env.VERSION }}-${{ env.RELEASE }}${{ env.DIST }}.${{ env.ARCH }}.rpm
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME"
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_OUTPUT
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_ENV
          echo "=== RPM file name: $ANOLIS_RPM_NAME ==="
          sha256sum rpms/$ANOLIS_RPM_NAME
          echo "=== RPM info ==="
          rpm -qpi rpms/$ANOLIS_RPM_NAME
          echo "=== RPM contents ==="
          rpm2cpio rpms/$ANOLIS_RPM_NAME | cpio -it
      - name: Import GPG key
        run: |
          export LANG=C.UTF-8
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID"
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
      - name: Configure rpmmacros
        run: |
          cat > ~/.rpmmacros << EOF
          %_signature gpg
          %_gpg_path ~/.gnupg
          %_gpg_name ${{ env.GPG_KEY_ID }}
          %_gpgbin /usr/bin/gpg2
          %__gpg_sign_cmd %{__gpg} gpg --force-v3-sigs --digest-algo sha256 --batch --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF
          gpg --armor --export "${GPG_KEY_ID}" > /tmp/gpg-pubkey.asc
          rpm --import /tmp/gpg-pubkey.asc
      - name: Sign RPM
        run: |
          echo "=== Signing RPM with GPG key: $GPG_KEY_ID ==="
          rpm --addsign rpms/$ANOLIS_RPM_NAME
          echo "=== Verifying RPM signature ==="
          rpm --checksig rpms/$ANOLIS_RPM_NAME
          echo "=== RPM file name: $ANOLIS_RPM_NAME ==="
          sha256sum rpms/$ANOLIS_RPM_NAME
          echo "=== RPM info ==="
          rpm -qpi rpms/$ANOLIS_RPM_NAME
          echo "=== RPM contents ==="
          rpm2cpio rpms/$ANOLIS_RPM_NAME | cpio -it
      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-rpm
          path: |
            rpms/${{ env.ANOLIS_RPM_NAME }}
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/rpm-anolis-os-release.txt
          cat /tmp/rpm-anolis-os-release.txt
      - name: Export installed packages
        run: |
          rpm -qa --queryformat '%{NAME}\t%{VERSION}\t%{RELEASE}\t%{ARCH}\n' | column -t -s $'\t' | sort -f > /tmp/rpm-anolis-installed-packages-rpm.txt
          cat /tmp/rpm-anolis-installed-packages-rpm.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-rpm-system-info
          path: |
            /tmp/rpm-anolis-installed-packages-rpm.txt
            /tmp/rpm-anolis-os-release.txt

  deb-debian:
    needs: build
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DEBIAN_DEB_NAME: ${{ steps.deb-file.outputs.DEBIAN_DEB_NAME }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      CLI_BRANCH: ${{ needs.build.outputs.CLI_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loongarch64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build tools
        run: |
          apt update
          apt install -y file
      - name: Extract version
        run: |
          VERSION=$(echo $CLI_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-binaries
          path: artifacts
      - name: Download shell completions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-completions
          path: artifacts/completions
      - name: Download man pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-man
          path: artifacts/man
      - name: Build DEB
        run: |
          PKG_ROOT=$(mktemp -d)
          mkdir -p $PKG_ROOT/usr/bin
          mkdir -p $PKG_ROOT/usr/share/man/man1
          mkdir -p $PKG_ROOT/usr/share/bash-completion/completions
          mkdir -p $PKG_ROOT/usr/share/fish/vendor_completions.d
          mkdir -p $PKG_ROOT/usr/share/zsh/site-functions
          mkdir -p $PKG_ROOT/usr/share/doc/docker-ce-cli
          mkdir -p $PKG_ROOT/DEBIAN

          install -m 755 artifacts/docker $PKG_ROOT/usr/bin/docker
          install -m 644 artifacts/man/docker.1 $PKG_ROOT/usr/share/man/man1/docker.1
          install -m 644 artifacts/completions/docker.bash $PKG_ROOT/usr/share/bash-completion/completions/docker
          install -m 644 artifacts/completions/docker.fish $PKG_ROOT/usr/share/fish/vendor_completions.d/docker.fish
          install -m 644 artifacts/completions/_docker.zsh $PKG_ROOT/usr/share/zsh/site-functions/_docker
          install -m 644 LICENSE $PKG_ROOT/usr/share/doc/docker-ce-cli/copyright

          cat > $PKG_ROOT/DEBIAN/control << EOF
          Package: docker-ce-cli
          Version: ${{ env.VERSION }}-${{ env.RELEASE }}
          Architecture: ${{ env.ARCH }}
          Maintainer: 徐晓伟 <xuxiaowei@xuxiaowei.com.cn>
          Description: Docker CLI (loong64)
           Docker CLI binary for the loong64 (LoongArch) architecture.
          Homepage: https://github.com/kubernetes-loong64/cli-loong64
          Section: admin
          Priority: optional
          EOF

          mkdir -p debs
          dpkg-deb --build $PKG_ROOT debs/

          find debs -name '*.deb'
      - name: List DEB files
        id: deb-file
        run: |
          DEBIAN_DEB_NAME=docker-ce-cli_${{ env.VERSION }}-${{ env.RELEASE }}_${{ env.ARCH }}.deb
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME"
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_OUTPUT
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_ENV
          echo "=== DEB file name: $DEBIAN_DEB_NAME ==="
          sha256sum debs/$DEBIAN_DEB_NAME
          echo "=== DEB info ==="
          dpkg --info debs/$DEBIAN_DEB_NAME
          echo "=== DEB contents ==="
          dpkg --contents debs/$DEBIAN_DEB_NAME
      - name: Import GPG key
        run: |
          export LANG=C.UTF-8
          apt install -y gnupg
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID"
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
      - name: Sign DEB
        run: |
          export LANG=C.UTF-8
          echo "=== Signing DEB with GPG key: $GPG_KEY_ID ==="
          gpg --detach-sign --armor --digest-algo sha256 -u "${GPG_KEY_ID}" debs/$DEBIAN_DEB_NAME
          echo "=== Verifying DEB signature ==="
          gpg --verify debs/$DEBIAN_DEB_NAME.asc debs/$DEBIAN_DEB_NAME
          echo "=== DEB file name: $DEBIAN_DEB_NAME ==="
          sha256sum debs/$DEBIAN_DEB_NAME
      - name: Upload DEB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-deb
          path: |
            debs/${{ env.DEBIAN_DEB_NAME }}
            debs/${{ env.DEBIAN_DEB_NAME }}.asc
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/deb-debian-os-release.txt
          cat /tmp/deb-debian-os-release.txt
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/deb-debian-installed-packages-packages.txt
          cat /tmp/deb-debian-installed-packages-packages.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-deb-system-info
          path: |
            /tmp/deb-debian-installed-packages-packages.txt
            /tmp/deb-debian-os-release.txt

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ rpm-anolis, deb-debian ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      ANOLIS_RPM_NAME: ${{ needs.rpm-anolis.outputs.ANOLIS_RPM_NAME }}
      DEBIAN_DEB_NAME: ${{ needs.deb-debian.outputs.DEBIAN_DEB_NAME }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-binaries
          path: loong64-artifacts
      - name: Download system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-system-info
          path: loong64-artifacts
      - name: Download RPM system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-rpm-system-info
          path: loong64-artifacts
      - name: Download DEB system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-deb-system-info
          path: loong64-artifacts
      - name: Download shell completions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-completions
          path: loong64-artifacts
      - name: Download RPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-rpm
          path: loong64-artifacts
      - name: Download DEB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-deb
          path: loong64-artifacts
      - name: Import GPG key
        run: |
          export LANG=C.UTF-8
          echo "${{ secrets.GPG_PRIVATE_KEY_BASE64 }}" | base64 -d | gpg --batch --import > /dev/null
          echo "$(gpg --list-secret-keys --keyid-format LONG | grep -Eo '[A-F0-9]{40}' | head -1):6:" | gpg --import-ownertrust
      - name: Sign artifacts
        run: |
          find loong64-artifacts -type f | while read -r file; do
            gpg --batch --detach-sign --armor "$file"
            echo "Signed: $file"
            gpg --verify "$file".asc "$file"
          done
      - name: Generate release body
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts
          
          | File                         | Download                                                                     |
          |------------------------------|------------------------------------------------------------------------------|
          | `docker`                     | [docker](${{ env.BASE_URL }}/docker)                                         |
          | `docker.bash`                | [docker.bash](${{ env.BASE_URL }}/docker.bash)                               |
          | `docker.fish`                | [docker.fish](${{ env.BASE_URL }}/docker.fish)                               |
          | `_docker.zsh`                | [_docker.zsh](${{ env.BASE_URL }}/_docker.zsh)                               |
          | `${{ env.ANOLIS_RPM_NAME }}` | [${{ env.ANOLIS_RPM_NAME }}](${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}) |
          | `${{ env.DEBIAN_DEB_NAME }}` | [${{ env.DEBIAN_DEB_NAME }}](${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}) |
          
          Each file has a corresponding `.asc` detached GPG signature.
          
          ```shell
          # Binary
          curl -LO ${{ env.BASE_URL }}/docker
          curl -LO ${{ env.BASE_URL }}/docker.asc
          
          # RPM (Anolis)
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}.asc
          
          # DEB (Debian)
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}.asc
          
          # Shell completions
          curl -LO ${{ env.BASE_URL }}/docker.bash
          curl -LO ${{ env.BASE_URL }}/docker.bash.asc
          curl -LO ${{ env.BASE_URL }}/docker.fish
          curl -LO ${{ env.BASE_URL }}/docker.fish.asc
          curl -LO ${{ env.BASE_URL }}/_docker.zsh
          curl -LO ${{ env.BASE_URL }}/_docker.zsh.asc
          ```
          
          ## Verifying releases
          
          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}

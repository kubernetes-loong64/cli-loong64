name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      RAW_VERSION: ${{ steps.extract.outputs.RAW_VERSION }}
      CLI_BRANCH: ${{ steps.extract.outputs.CLI_BRANCH }}
      RELEASE: ${{ steps.extract.outputs.RELEASE }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract cli branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_ENV}
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_OUTPUT}
          CLI_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "CLI_BRANCH=$CLI_BRANCH"
          echo "CLI_BRANCH=$CLI_BRANCH" >> ${GITHUB_ENV}
          echo "CLI_BRANCH=$CLI_BRANCH" >> ${GITHUB_OUTPUT}
          RELEASE=$(echo $RAW_VERSION | awk -F'+' '{print $2}')
          RELEASE=${RELEASE:-alpha}
          echo "RELEASE=$RELEASE"
          echo "RELEASE=$RELEASE" >> ${GITHUB_ENV}
          echo "RELEASE=$RELEASE" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git make golang file
      - name: Clone cli
        run: |
          git clone --branch ${{ env.CLI_BRANCH }} --depth 1 https://github.com/docker/cli.git cli
      - name: ls
        run: ls -lah
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: cli
      #  run: git apply ../*.patch
      - name: Build cli
        working-directory: cli
        run: docker buildx bake binary --set "*.platform=linux/loong64"
      - name: Print binary SHA-256 checksums
        working-directory: cli
        run: |
          find build/* | xargs sha256sum
      - name: Inspect binary file types
        working-directory: cli
        run: |
          echo "=== bin ==="
          file build/*
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-binaries
          path: |
            cli/build/docker
      - name: Install QEMU binfmt for loong64
        run: |
          docker run --privileged --rm ghcr.io/loong64/binfmt --install all
      - name: Print docker version
        working-directory: cli
        run: |
          ./build/docker -v
          ./build/docker version
      - name: Generate shell completions
        working-directory: cli
        run: |
          mkdir -p completions
          ./build/docker completion bash > completions/docker.bash
          ./build/docker completion fish > completions/docker.fish
          ./build/docker completion zsh  > completions/_docker.zsh
          echo "=== docker.bash ==="
          cat completions/docker.bash
          echo "=== docker.fish ==="
          cat completions/docker.fish
          echo "=== _docker.zsh ==="
          cat completions/_docker.zsh
      - name: Upload shell completions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-completions
          path: |
            cli/completions/*
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/installed-packages.txt
          cat /tmp/installed-packages.txt
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/os-release.txt
          cat /tmp/os-release.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-system-info
          path: |
            /tmp/installed-packages.txt
            /tmp/os-release.txt

  rpm:
    needs: build
    runs-on: ubuntu-latest
    container: openanolis/anolisos:23
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      CLI_BRANCH: ${{ needs.build.outputs.CLI_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
    steps:
      - name: Install gzip
        run: yum install -y gzip
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract version
        run: |
          VERSION=$(echo $CLI_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
      - name: Install build tools
        run: yum install -y rpm-build rpmdevtools
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-binaries
          path: artifacts
      - name: Download shell completions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-completions
          path: artifacts/completions
      - name: Build RPM
        env:
          ARCH: loongarch64
        run: |
          rm -rf ~/rpmbuild
          rpmdev-setuptree
          find ~/rpmbuild
          cp artifacts/docker ~/rpmbuild/BUILD/
          cp -r artifacts/completions ~/rpmbuild/BUILD/
          cp docker-ce-cli.spec ~/rpmbuild/SPECS/
          rpmbuild -ba --target ${{ env.ARCH }} ~/rpmbuild/SPECS/docker-ce-cli.spec \
            --define "version ${{ env.VERSION }}" \
            --define "release ${{ env.RELEASE }}"
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp -t rpms {} +
      - name: List RPM files
        run: |
          echo "=== RPM checksums ==="
          sha256sum rpms/*.rpm
          echo "=== RPM info ==="
          rpm -qpi rpms/*.rpm
          rpm2cpio rpms/*.rpm | cpio -it
      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-loong64-rpm
          path: |
            rpms/*.rpm

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ rpm ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-binaries
          path: loong64-artifacts
      - name: Download system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-system-info
          path: loong64-artifacts
      - name: Download shell completions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-completions
          path: loong64-artifacts
      - name: Download RPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-loong64-rpm
          path: loong64-artifacts
      - name: Generate release body
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts
          
          | File                | Download                                       |
          |---------------------|------------------------------------------------|
          | `docker`            | [docker](${{ env.BASE_URL }}/docker)           |
          | `docker.bash`       | [docker.bash](${{ env.BASE_URL }}/docker.bash) |
          | `docker.fish`       | [docker.fish](${{ env.BASE_URL }}/docker.fish) |
          | `_docker.zsh`       | [_docker.zsh](${{ env.BASE_URL }}/_docker.zsh) |
          | `*.loongarch64.rpm` | See release assets                             |
          
          Each file has a corresponding `.asc` detached GPG signature.
          
          ```shell
          # Binary
          curl -LO ${{ env.BASE_URL }}/docker
          curl -LO ${{ env.BASE_URL }}/docker.asc
          
          # Shell completions
          curl -LO ${{ env.BASE_URL }}/docker.bash
          curl -LO ${{ env.BASE_URL }}/docker.bash.asc
          curl -LO ${{ env.BASE_URL }}/docker.fish
          curl -LO ${{ env.BASE_URL }}/docker.fish.asc
          curl -LO ${{ env.BASE_URL }}/_docker.zsh
          curl -LO ${{ env.BASE_URL }}/_docker.zsh.asc
          ```
          
          ## Verifying releases
          
          ```shell
          gpg --keyserver keys.openpgp.org --recv-keys FCF8724722CCBF9F51B1FBE376532BE7E3013105
          echo "FCF8724722CCBF9F51B1FBE376532BE7E3013105:6:" | gpg --import-ownertrust
          gpg --verify <file>.asc <file>
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}
          files: |
            loong64-artifacts/**
